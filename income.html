<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FinanceFlow</title>

    <link rel="stylesheet" href="style.css">
      <link rel="stylesheet" href="responsive.css">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">

</head>

<body>

<div class="container">

    <!-- Sidebar -->

    <aside class="sidebar">

        <div class="logo">
            <div class="logo-icon">
            <i class="fa-solid fa-wallet"></i>
            </div>
            <h2>FinanceFlow</h2>
        </div>

        <ul>

    <li class="active">
        <a href="index.html">
            <i class="fa-solid fa-house"></i>
            Dashboard
        </a>
    </li>

    <li>
        <a href="income.html">
            <i class="fa-solid fa-money-bill-wave"></i>
            Income
        </a>
    </li>

    <li>
        <a href="expense.html">
            <i class="fa-solid fa-credit-card"></i>
            Expenses
        </a>
    </li>

    <li>
        <a href="transactions.html">
            <i class="fa-solid fa-arrow-right-arrow-left"></i>
            Transactions
        </a>
    </li>

    <li>
        <a href="budgets.html">
            <i class="fa-solid fa-chart-pie"></i>
            Budget
        </a>
    </li>

    <li>
        <a href="report.html">
            <i class="fa-solid fa-chart-line"></i>
            Reports
        </a>
    </li>

    <li>
        <a href="settings.html">
            <i class="fa-solid fa-gear"></i>
            Settings
        </a>
    </li>

</ul>
    </aside>

    <!-- Main -->

    <main class="main">

        <div class="topbar">

     <div class="left">

        <i class="fa-solid fa-bars"></i>

        <h1>Income</h1>

    </div>

    <div class="right">

        <button class="date-btn">

            <i class="fa-regular fa-calendar"></i>

            <span id="currentDate"></span>

        </button>
        <button class="income-btn">
            <i class="fa-solid fa-plus"></i>
            Add Income
        </button>
        <button class="expense-btn">
            <i class="fa-solid fa-minus"></i>
            Add Expense
        </button>
        <div class="profile">

            <div class="avatar">T</div>

            <span>Tanvir Kaur</span>

        </div>

    </div>
        </div>
        <section class="income-page">

    <div class="income-header">

        <div>
            <h2>Total Income</h2>
            <h1 id="incomeTotal">₹0</h1>
        </div>

        <button class="income-btn">
            <i class="fa-solid fa-plus"></i>
            Add Income
        </button>

    </div>

    <div class="income-history">

        <h2>Income History</h2>

        <table>

            <thead>
                <tr>
                    <th>Date</th>
                    <th>Category</th>
                    <th>Amount</th>
                    <th>Notes</th>
                </tr>
            </thead>

            <tbody id="incomeTable">

            </tbody>

        </table>

    </div>
        </section>
    </main>

<div class="modal" id="incomeModal">

    <div class="modal-content">

        <h2>Add Income</h2>
        <span class="close-btn">&times;</span>

        <div class="input-group">
    
            <label>Amount</label>
            <input type="number" id="incomeAmount" placeholder="Enter amount">
        </div>

        <div class="input-group">
            <label>Category</label>

            <select id="incomeCategory">
                <option>Salary</option>
                <option>Business</option>
                <option>Freelancing</option>
                <option>Investment</option>
                <option>Other</option>
            </select>
        </div>

        <div class="input-group">
            <label>Date</label>
            <input type="date" id="incomeDate">
        </div>

        <div class="input-group">
            <label>Notes</label>
            <textarea id="incomeNotes" placeholder="Write a note..."></textarea>
        </div>

        <button class="save-btn">
            Save Income
        </button>

    </div>

</div>
<div class="modal" id="expenseModal">

    <div class="modal-content">

        <h2>Add Expense</h2>

        <span class="close-expense-btn">&times;</span>

        <div class="input-group">
            <label>Amount</label>
            <input type="number" id="expenseAmount" placeholder="Enter amount">
        </div>

        <div class="input-group">
            <label>Category</label>

            <select id="expenseCategory">
                <option>Food</option>
                <option>Shopping</option>
                <option>Travel</option>
                <option>Bills</option>
                <option>Entertainment</option>
                <option>Other</option>
            </select>
        </div>

        <div class="input-group">
            <label>Date</label>
            <input type="date" id="expenseDate">
        </div>

        <div class="input-group">
            <label>Notes</label>
            <textarea id="expenseNotes" placeholder="Write a note..."></textarea>
        </div>

        <button class="expense-save-btn">
            Save Expense
        </button>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script src="app.js"></script>

</body>

</html>
